{% extends "base.html" %}

{% block content %}
<form method="post">
    {% csrf_token %}
    <label for="collection">Select collection:</label>
    <select name="collection" id="collection">
        {% for col in collections %}
            <option value="{{ col.id }}">{{ col.name }}</option>
        {% endfor %}
    </select>
    <button type="submit">Start Training</button>
</form>
{% endblock %}
